<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GtsTrack</title>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    display:flex;
    background:#eef4ff;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:linear-gradient(180deg,#0f172a,#1e3a8a);
    color:white;
    padding:25px;
    box-shadow:4px 0 15px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#60a5fa;
    margin-bottom:40px;
    letter-spacing:1px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:12px 0;
}

.sidebar ul li a{
    text-decoration:none;
    color:white;
    display:block;
    padding:12px 15px;
    border-radius:12px;
    transition:0.3s;
}

.sidebar ul li a:hover{
    background:#3b82f6;
    transform:translateX(5px);
}

.content{
    flex:1;
    padding:35px;
}
.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
.card{
    background:white;
    padding:25px;
    border-radius:16px;
    width:300px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;

    flex:1;
    min-width:250px;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 30px rgba(37,99,235,0.15);
}

.card h3{
    color:#2563eb;
    margin-bottom:10px;
}
.sidebar{
    width:260px;
    min-height:100vh;
    background:
    linear-gradient(rgba(15,23,42,.85), rgba(30,58,138,.85)),
    url("/static/images/waves.gif");

    background-size:cover;
    background-position:center;
    color:white;
    padding:25px;
}
.bubble{
    position:absolute;
    bottom:-20px;
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(96,165,250,.4);

    animation:rise linear infinite;
    pointer-events:none;
}

@keyframes rise{

    0%{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-900px);
        opacity:0;
    }
}
body::-webkit-scrollbar{
    display:none;
}

html{
    scrollbar-width:none;
}
    </style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
    <img
        src="/static/images/logo.png"
        alt="GtsTrack"
        style="
        width: 200px;
        display:block;
        margin:0 auto;
        "
    >
</div>

    <ul>
        <li><a href="/">🏠 Tableau de bord</a></li>
        <li><a href="/clients/">👥 Clients</a></li>
        <li><a href="/commandes/">📦 Commandes</a></li>
        <li><a href="/livraisons/">🚚 Livraisons</a></li>
        <li><a href="/carte/">🗺️ Carte</a></li>
        <li><a href="/statistiques/">📊 Statistiques</a></li>
        <li> <a href="/logout/">🚪 Déconnexion </a>
            
</li>
    </ul>
</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>
<script>
for(let i=0;i<40;i++){

    let bubble=document.createElement("div");

    bubble.classList.add("bubble");

    let size = 3 + Math.random()*10;

    bubble.style.width = size + "px";
    bubble.style.height = size + "px";

    bubble.style.left = Math.random()*120 + "px";

    bubble.style.animationDuration =
    (4 + Math.random()*8) + "s";

    bubble.style.animationDelay =
    Math.random()*5 + "s";

    document.querySelector(".sidebar")
    .appendChild(bubble);
}
</script>
</body>
</html>
