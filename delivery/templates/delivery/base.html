<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GtsTrack</title>

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    display:flex;
    background:#eef4ff;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:linear-gradient(180deg,#0f172a,#1e3a8a);
    color:white;
    padding:25px;
    box-shadow:4px 0 15px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#60a5fa;
    margin-bottom:40px;
    letter-spacing:1px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    margin:12px 0;
}

.sidebar ul li a{
    text-decoration:none;
    color:white;
    display:block;
    padding:12px 15px;
    border-radius:12px;
    transition:0.3s;
}

.sidebar ul li a:hover{
    background:#3b82f6;
    transform:translateX(5px);
}

.content{
    flex:1;
    padding:35px;
}
.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}
.card{
    background:white;
    padding:25px;
    border-radius:16px;
    width:260px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.3s;

    flex:1;
    min-width:250px;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 30px rgba(37,99,235,0.15);
}

.card h3{
    color:#2563eb;
    margin-bottom:10px;
}
    </style>
</head>

<body>

<div class="sidebar">
    <div class="logo">GtsTrack</div>

    <ul>
        <li><a href="/">🏠 Tableau de bord</a></li>
        <li><a href="/clients/">👥 Clients</a></li>
        <li><a href="/commandes/">📦 Commandes</a></li>
        <li><a href="/livraisons/">🚚 Livraisons</a></li>
        <li><a href="/carte/">🗺️ Carte</a></li>
        <li><a href="#">📊 Statistiques</a></li>
        <li><a href="#">🚪 Déconnexion</a></li>
    </ul>
</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
