<!DOCTYPE html>
<html>
<head>
    <title>GtsTrack Login</title>
</head>
<body style="
background:#eef4ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Segoe UI;
">

<div style="
background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
">

<h1 style="text-align:center;color:#1e3a8a;">
🔐 GtsTrack
</h1>

<br>

<form method="POST">
{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
style="
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
">

<input
type="password"
name="password"
placeholder="Password"
style="
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
">

<button
type="submit"
style="
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
">
Connexion
</button>

</form>

</div>

</body>
</html>
